<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnCourt — Research Hub</title>

  <!-- Design System tokens -->
  <link rel="stylesheet" href="ds/tokens/fonts.css">
  <link rel="stylesheet" href="ds/tokens/colors.css">
  <link rel="stylesheet" href="ds/tokens/typography.css">
  <link rel="stylesheet" href="ds/tokens/spacing.css">
  <link rel="stylesheet" href="ds/tokens/base.css">
  <link rel="stylesheet" href="ds/styles.css">

  <style>
    html { scroll-behavior: smooth; }

    ::selection {
      background: var(--flame-200);
      color: var(--graphite-900);
    }

    /* ── Responsive ────────────────────────────────────────── */
    .oc-burger { display: none; }
    .oc-mobile-menu { display: none !important; }

    /* Research grid: 3 cols → 2 → 1 as the viewport narrows */
    @media (max-width: 1180px) {
      .oc-research-grid { grid-template-columns: repeat(2, minmax(0, 400px)) !important; }
    }
    @media (max-width: 800px) {
      .oc-research-grid { grid-template-columns: minmax(0, 400px) !important; }
    }

    @media (max-width: 720px) {
      /* Replace desktop nav with burger */
      .oc-nav-desktop { display: none !important; }
      .oc-burger { display: flex !important; }
      .oc-mobile-menu.open { display: block !important; }

      /* Hero: stack contribute card under text */
      section[id] > div[style*="grid-template-columns"],
      body > div#root section > div[style*="grid-template-columns: 1fr auto"] {
        grid-template-columns: 1fr !important;
        gap: var(--space-6) !important;
      }

      /* Contribute card full width on mobile */
      div[style*="width: 380"] {
        width: 100% !important;
        max-width: 480px !important;
      }

      /* Research category filters scroll horizontally */
      section#research > div > div:first-child {
        overflow-x: auto;
        flex-wrap: nowrap !important;
        padding-bottom: 8px;
      }
    }

    @media (max-width: 640px) {
      nav > div.oc-nav-desktop > div:first-child {
        display: none !important;
      }
    }
  </style>
</head>
